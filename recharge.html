<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Daddy - Advanced Deposit System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #090b0e; color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        .gold-gradient { background: linear-gradient(135deg, #ffe259 0%, #ffa751 100%); }
        .gold-text { background: linear-gradient(135deg, #ffe259 0%, #ffa751 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-dark { background: linear-gradient(145deg, #151a22, #1b222c); border: 1px solid rgba(255, 167, 81, 0.1); }
        input:focus { outline: none; border-color: #ffa751 !important; box-shadow: 0 0 10px rgba(255, 167, 81, 0.2); }
    </style>
</head>
<body class="pb-24 max-w-md mx-auto shadow-2xl relative min-h-screen">

    <header class="bg-[#11161e] border-b border-gray-800 p-4 sticky top-0 z-50 flex items-center">
        <a href="game.html" class="text-gray-400 hover:text-white mr-4 text-xl">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <h1 class="text-xl font-bold tracking-wide text-white">Recharge Wallet</h1>
    </header>

    <div class="p-4">
        <div class="card-dark rounded-2xl p-5 flex justify-between items-center relative overflow-hidden shadow-xl">
            <div>
                <p class="text-xs text-gray-400 font-semibold tracking-wider">Current Balance</p>
                <h3 class="text-3xl font-black mt-1 text-white">₹<span id="displayWalletBalance">0.00</span></h3>
            </div>
            <div class="w-12 h-12 rounded-xl bg-yellow-500/10 flex items-center justify-center border border-yellow-500/20">
                <i class="fa-solid fa-wallet text-yellow-500 text-xl"></i>
            </div>
        </div>
    </div>

    <main class="px-4 space-y-4">
        
        <div id="stepAmountBox" class="card-dark rounded-2xl p-5 space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">1. Enter Deposit Amount (₹)</label>
                <div class="relative">
                    <span class="absolute left-4 top-3 text-lg font-bold text-gray-500">₹</span>
                    <input type="number" id="rechargeAmount" value="500" min="100" placeholder="Min ₹100" required
                        class="w-full bg-[#0c1015] border border-gray-800 rounded-xl py-3 pl-9 pr-4 text-lg font-black text-yellow-400 transition-all">
                </div>
            </div>

            <div class="grid grid-cols-4 gap-2">
                <button onclick="setRechargeAmount(300)" class="bg-[#0c1015] border border-gray-800 py-2 rounded-lg font-bold text-xs text-gray-300 active:scale-95 transition-transform cursor-pointer">₹300</button>
                <button onclick="setRechargeAmount(500)" class="bg-[#0c1015] border border-gray-800 py-2 rounded-lg font-bold text-xs text-gray-300 active:scale-95 transition-transform cursor-pointer">₹500</button>
                <button onclick="setRechargeAmount(1000)" class="bg-[#0c1015] border border-gray-800 py-2 rounded-lg font-bold text-xs text-gray-300 active:scale-95 transition-transform cursor-pointer">₹1,000</button>
                <button onclick="setRechargeAmount(5000)" class="bg-[#0c1015] border border-gray-800 py-2 rounded-lg font-bold text-xs text-gray-300 active:scale-95 transition-transform cursor-pointer">₹5,000</button>
            </div>

            <button onclick="proceedToPayment()" class="w-full gold-gradient text-black font-extrabold py-3 rounded-xl shadow-lg uppercase text-xs tracking-wider cursor-pointer">
                Proceed to Pay
            </button>
        </div>

        <div id="paymentGatewayBox" class="hidden card-dark rounded-2xl p-5 space-y-5 text-center">
            
            <div class="bg-red-500/10 border border-red-500/20 rounded-xl py-2 px-4 inline-flex items-center space-x-2 mx-auto">
                <i class="fa-solid fa-hourglass-half text-red-500 text-xs animate-spin"></i>
                <span class="text-xs font-mono font-bold text-red-400">Time Left: <span id="paymentTimer">02:00</span></span>
            </div>

            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">2. Scan QR Code or Pay via UPI</p>

            <div class="bg-white p-3 rounded-xl inline-block mx-auto border-4 border-yellow-500/30">
                <img id="adminQrImage" src="https://i.ibb.co/7t5HtKMV/IMG-20260530-WA0000.jpg" alt="Payment QR Code" class="w-44 h-44 object-contain">
            </div>

            <div class="bg-[#0c1015] border border-gray-800 rounded-xl p-3 flex justify-between items-center text-left">
                <div class="truncate mr-2">
                    <p class="text-[9px] text-gray-500 uppercase tracking-wide">UPI ID String</p>
                    <p class="text-xs font-mono font-bold text-yellow-500 mt-0.5 truncate" id="adminUpiId">loading_upi...</p>
                </div>
                <button onclick="copyAdminUpi()" class="bg-gray-800 text-gray-300 text-xs font-bold px-2.5 py-1.5 rounded-lg active:scale-95 transition-transform whitespace-nowrap cursor-pointer">
                    <i class="fa-solid fa-copy mr-1"></i> Copy
                </button>
            </div>

            <div class="border-t border-gray-800/60 pt-4 text-left space-y-3">
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">3. Enter 12-Digit UPI UTR / Ref No.</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-3 text-gray-500 text-sm"><i class="fa-solid fa-receipt"></i></span>
                        <input type="text" id="utrNumber" maxlength="12" placeholder="Ex: 4125XXXXXXXX" required
                            class="w-full bg-[#0c1015] border border-gray-800 rounded-xl py-2.5 pl-10 pr-4 text-sm font-mono tracking-widest text-white transition-all">
                    </div>
                </div>

                <button onclick="submitRechargeRequest()" class="w-full gold-gradient text-black font-extrabold py-3 rounded-xl shadow-lg text-center tracking-wide uppercase text-xs cursor-pointer">
                    Confirm & Submit UTR
                </button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#11161e] border-t border-gray-800 grid grid-cols-5 py-2 text-center z-50">
        <a href="index.html" class="text-gray-400 flex flex-col items-center justify-center"><i class="fa-solid fa-house text-lg"></i><span class="text-[10px] mt-1">Home</span></a>
        <a href="promotion.html" class="text-gray-400 flex flex-col items-center justify-center"><i class="fa-solid fa-share-nodes text-lg"></i><span class="text-[10px] mt-1">Invite</span></a>
        <a href="game.html" class="text-gray-400 flex flex-col items-center justify-center relative -top-4">
            <div class="w-12 h-12 gold-gradient rounded-full flex items-center justify-center text-black border-4 border-[#090b0e]"><i class="fa-solid fa-gamepad text-xl"></i></div>
            <span class="text-[10px] mt-0.5 font-bold text-yellow-500">Bet</span>
        </a>
        <a href="recharge.html" class="text-yellow-500 flex flex-col items-center justify-center"><i class="fa-solid fa-wallet text-lg"></i><span class="text-[10px] mt-1">Wallet</span></a>
        <a href="profile.html" class="text-gray-400 flex flex-col items-center justify-center"><i class="fa-solid fa-user text-lg"></i><span class="text-[10px] mt-1">Mine</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBjB5uOFrL8OfuqAHWlyB5_p_say0KrFuY",
          authDomain: "big-daddy-7422f.firebaseapp.com",
          databaseURL: "https://big-daddy-7422f-default-rtdb.firebaseio.com",
          projectId: "big-daddy-7422f",
          storageBucket: "big-daddy-7422f.firebasestorage.app",
          messagingSenderId: "528194459346",
          appId: "1:528194459346:web:458044786db1c36281ff0b",
          measurementId: "G-ZY2D9HT28C"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        let currentUser = null;
        let countdownTimer = null;

        // 1. Session check & Load Live Balance
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                onValue(ref(database, 'users/' + user.uid), (snapshot) => {
                    const data = snapshot.val();
                    if(data) document.getElementById('displayWalletBalance').innerText = parseFloat(data.walletBalance).toFixed(2);
                });
            } else {
                alert("Session expired. Please log in.");
                window.location.href = "login.html";
            }
        });

        // 2. Fetch Admin QR Image & UPI Strings
        onValue(ref(database, 'admin_settings'), (snapshot) => {
            if(snapshot.exists()) {
                const settings = snapshot.val();
                if(settings.deposit_upi) document.getElementById('adminUpiId').innerText = settings.deposit_upi;
                
                // Agar database me link hai toh wo dikhega, nahi toh aapka naya link fallback banega
                if(settings.deposit_qr_url) {
                    document.getElementById('adminQrImage').src = settings.deposit_qr_url;
                } else {
                    document.getElementById('adminQrImage').src = "https://i.ibb.co/7t5HtKMV/IMG-20260530-WA0000.jpg";
                }
            } else {
                // System default fallback settings
                document.getElementById('adminUpiId').innerText = "bigdaddy@ybl";
                document.getElementById('adminQrImage').src = "https://i.ibb.co/7t5HtKMV/IMG-20260530-WA0000.jpg";
            }
        });

        // 3. UI Workflow Control
        window.proceedToPayment = function() {
            const amount = parseInt(document.getElementById('rechargeAmount').value);
            if(isNaN(amount) || amount < 100) {
                alert("Minimum deposit limit is ₹100.");
                return;
            }

            document.getElementById('stepAmountBox').classList.add('hidden');
            document.getElementById('paymentGatewayBox').classList.remove('hidden');

            startRechargeCountdown(120);
        }

        function startRechargeCountdown(durationSeconds) {
            let timeLeft = durationSeconds;
            const timerDisplay = document.getElementById('paymentTimer');

            if (countdownTimer) clearInterval(countdownTimer);

            countdownTimer = setInterval(() => {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                timerDisplay.innerText = `${minutes}:${seconds}`;

                if (--timeLeft < 0) {
                    clearInterval(countdownTimer);
                    alert("Payment window expired! Please initiate a new recharge transaction request.");
                    document.getElementById('paymentGatewayBox').classList.add('hidden');
                    document.getElementById('stepAmountBox').classList.remove('hidden');
                    document.getElementById('utrNumber').value = "";
                }
            }, 1000);
        }

        // 4. Submit Payload Logs to Database
        window.submitRechargeRequest = function() {
            const amount = parseInt(document.getElementById('rechargeAmount').value);
            const utr = document.getElementById('utrNumber').value.trim();

            // Strict 12-digit numeric check using Regex
            if(!/^\d{12}$/.test(utr)) {
                alert("Please type a valid 12-digit numeric transaction UTR code.");
                return;
            }

            clearInterval(countdownTimer);
            const requestId = "REQ" + Math.floor(100000 + Math.random() * 900000);

            set(ref(database, 'recharge_requests/' + requestId), {
                requestId: requestId,
                uid: currentUser.uid,
                userEmail: currentUser.email || 'Google User',
                amount: amount,
                utrNumber: utr,
                status: "Pending",
                timestamp: new Date().toISOString()
            })
            .then(() => {
                alert("Transaction details recorded!\nAdmin will cross-check your 12-Digit UTR and fund your balance wallet shortly.");
                window.location.href = "game.html";
            })
            .catch((err) => {
                alert("System write error: " + err.message);
            });
        }

        // Global Utility Functions
        window.setRechargeAmount = function(amt) { document.getElementById('rechargeAmount').value = amt; }
        window.copyAdminUpi = function() {
            const upiText = document.getElementById('adminUpiId').innerText;
            navigator.clipboard.writeText(upiText).then(() => { alert("Admin UPI ID copied!"); });
        }
    </script>
</body>
</html>
