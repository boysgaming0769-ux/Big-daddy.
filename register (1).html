
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Daddy - Premium Authentication</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #090b0e;
            color: #f3f4f6;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .gold-gradient {
            background: linear-gradient(135deg, #ffe259 0%, #ffa751 100%);
        }
        .gold-text {
            background: linear-gradient(135deg, #ffe259 0%, #ffa751 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-dark {
            background: linear-gradient(145deg, #151a22, #1b222c);
            border: 1px solid rgba(255, 167, 81, 0.1);
        }
    </style>
</head>
<body class="pb-24 max-w-md mx-auto shadow-2xl relative min-h-screen flex flex-col justify-between">

    <header class="bg-[#11161e] border-b border-gray-800 p-4 sticky top-0 z-50 flex items-center">
        <a href="index.html" class="text-gray-400 hover:text-white mr-4 text-xl">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <h1 class="text-xl font-bold tracking-wide text-white">Join Big Daddy</h1>
    </header>

    <main class="p-6 flex-grow flex flex-col justify-center">
        <div class="text-center mb-10">
            <i class="fa-solid fa-crown text-yellow-500 text-5xl mb-3 animate-bounce"></i>
            <h2 class="text-4xl font-black tracking-wider gold-text uppercase">Big Daddy</h2>
            <p class="text-xs text-gray-400 mt-2">The Ultimate One-Click Gaming Login</p>
        </div>

        <div class="card-dark rounded-2xl p-8 shadow-2xl text-center space-y-6">
            <div class="space-y-2">
                <h3 class="text-lg font-bold text-white">Quick Sign-In / Register</h3>
                <p class="text-xs text-gray-400">No passwords or OTP required. Securely connect using your Google Account.</p>
            </div>

            <button id="googleSignInBtn" class="w-full bg-white text-gray-900 font-bold py-3.5 px-4 rounded-xl shadow-lg flex items-center justify-center space-x-3 active:scale-[0.98] transition-transform hover:bg-gray-100 cursor-pointer">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span class="text-sm tracking-wide">Continue with Google</span>
            </button>

            <div class="border-t border-gray-800/60 pt-4 text-[11px] text-gray-500 flex justify-center items-center space-x-4">
                <span><i class="fa-solid fa-shield-halved text-green-500 mr-1"></i> SSL Secured</span>
                <span><i class="fa-solid fa-user-check text-yellow-500 mr-1"></i> Instant Verification</span>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#11161e] border-t border-gray-800 grid grid-cols-5 py-2 text-center z-50">
        <a href="index.html" class="text-gray-400 hover:text-gray-200 flex flex-col items-center justify-center">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[10px] mt-1">Home</span>
        </a>
        <a href="promotion.html" class="text-gray-400 hover:text-gray-200 flex flex-col items-center justify-center">
            <i class="fa-solid fa-share-nodes text-lg"></i>
            <span class="text-[10px] mt-1">Invite</span>
        </a>
        <a href="game.html" class="text-gray-400 flex flex-col items-center justify-center relative -top-4">
            <div class="w-12 h-12 gold-gradient rounded-full flex items-center justify-center text-black shadow-lg border-4 border-[#090b0e]">
                <i class="fa-solid fa-gamepad text-xl"></i>
            </div>
            <span class="text-[10px] mt-0.5 font-bold text-yellow-500">Bet</span>
        </a>
        <a href="recharge.html" class="text-gray-400 hover:text-gray-200 flex flex-col items-center justify-center">
            <i class="fa-solid fa-wallet text-lg"></i>
            <span class="text-[10px] mt-1">Wallet</span>
        </a>
        <a href="profile.html" class="text-gray-400 hover:text-gray-200 flex flex-col items-center justify-center">
            <i class="fa-solid fa-user text-lg"></i>
            <span class="text-[10px] mt-1">Mine</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            GoogleAuthProvider, 
            signInWithPopup 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Your New Web App's production configuration details
        const firebaseConfig = {
          apiKey: "AIzaSyBjB5uOFrL8OfuqAHWlyB5_p_say0KrFuY",
          authDomain: "big-daddy-7422f.firebaseapp.com",
          databaseURL: "https://big-daddy-7422f-default-rtdb.firebaseio.com",
          projectId: "big-daddy-7422f",
          storageBucket: "big-daddy-7422f.firebasestorage.app",
          messagingSenderId: "528194459346",
          appId: "1:528194459346:web:458044786db1c36281ff0b",
          measurementId: "G-ZY2D9HT28C"
        };

        // Initialize Services
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const googleSignInBtn = document.getElementById('googleSignInBtn');

        googleSignInBtn.addEventListener('click', () => {
            // Trigger Firebase Google Popup Auth Flow
            signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;
                    
                    // User ID me se special characters hatane ke liye clear key bana rahe hain
                    const cleanUserId = user.uid; 
                    const dbRef = ref(database);

                    // Check karein ki user database me pehle se hai ya nahi
                    get(child(dbRef, `users/${cleanUserId}`)).then((snapshot) => {
                        if (snapshot.exists()) {
                            // User pehle se registered hai (Sidhhi Login Execution)
                            alert(`Welcome back, ${user.displayName}!`);
                            window.location.href = "game.html";
                        } else {
                            // Naya user hai, uski entry profile banao (Registration Execution)
                            set(ref(database, 'users/' + cleanUserId), {
                                uid: user.uid,
                                name: user.displayName,
                                email: user.email,
                                profilePic: user.photoURL,
                                walletBalance: 0, // Shuruati balance ₹0
                                createdAt: new Date().toISOString()
                            })
                            .then(() => {
                                alert(`Registration Successful! Welcome ${user.displayName}`);
                                window.location.href = "game.html";
                            })
                            .catch((dbError) => {
                                alert("Database Error: " + dbError.message);
                            });
                        }
                    }).catch((error) => {
                        console.error("Database check error:", error);
                    });

                })
                .catch((error) => {
                    console.error("Google Sign-In Error: ", error);
                    alert("Authentication Failed: " + error.message);
                });
        });
    </script>
</body>
</html>
