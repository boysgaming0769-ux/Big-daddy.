<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Daddy - My Bet History</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #090b0e; color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        .gold-gradient { background: linear-gradient(135deg, #ffe259 0%, #ffa751 100%); }
        .gold-text { background: linear-gradient(135deg, #ffe259 0%, #ffa751 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-dark { background: linear-gradient(145deg, #151a22, #1b222c); border: 1px solid rgba(255, 167, 81, 0.1); }
    </style>
</head>
<body class="pb-24 max-w-md mx-auto shadow-2xl relative min-h-screen">

    <header class="bg-[#11161e] border-b border-gray-800 p-4 sticky top-0 z-50 flex items-center">
        <a href="game.html" class="text-gray-400 hover:text-white mr-4 text-xl">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <h1 class="text-xl font-bold tracking-wide text-white">Bet History</h1>
    </header>

    <main class="p-4 space-y-3" id="historyFeedContainer">
        <div id="historyLoader" class="text-center py-12 text-sm text-gray-500 italic">
            <i class="fa-solid fa-circle-notch animate-spin mr-2 text-yellow-500 text-lg"></i> Fetching your betting ledgers...
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#11161e] border-t border-gray-800 grid grid-cols-5 py-2 text-center z-50">
        <a href="index.html" class="text-gray-400 flex flex-col items-center justify-center"><i class="fa-solid fa-house text-lg"></i><span class="text-[10px] mt-1">Home</span></a>
        <a href="promotion.html" class="text-gray-400 flex flex-col items-center justify-center"><i class="fa-solid fa-share-nodes text-lg"></i><span class="text-[10px] mt-1">Invite</span></a>
        <a href="game.html" class="text-gray-400 flex flex-col items-center justify-center relative -top-4">
            <div class="w-12 h-12 gold-gradient rounded-full flex items-center justify-center text-black border-4 border-[#090b0e]"><i class="fa-solid fa-gamepad text-xl"></i></div>
            <span class="text-[10px] mt-0.5 font-bold text-yellow-500">Bet</span>
        </a>
        <a href="recharge.html" class="text-gray-400 flex flex-col items-center justify-center"><i class="fa-solid fa-wallet text-lg"></i><span class="text-[10px] mt-1">Wallet</span></a>
        <a href="profile.html" class="text-yellow-500 flex flex-col items-center justify-center"><i class="fa-solid fa-user text-lg"></i><span class="text-[10px] mt-1">Mine</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Updated Production Firebase Credentials (big-daddy-7422f)
        const firebaseConfig = {
          apiKey: "AIzaSyBjB5uOFrL8OfuqAHWlyB5_p_say0KrFuY",
          authDomain: "big-daddy-7422f.firebaseapp.com",
          databaseURL: "https://big-daddy-7422f-default-rtdb.firebaseio.com",
          projectId: "big-daddy-7422f",
          storageBucket: "big-daddy-7422f.firebasestorage.app",
          messagingSenderId: "528194459346",
          appId: "1:528194459346:web:458044786db1c36281ff0b",
          measurementId: "G-ZY2D9HT28C"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // 1. Session Auth State Checker Hook
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Fetch only logs pointing to current user session UID
                loadUserBetLogsHistory(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        // 2. Query Firebase Realtime for User Specific Bets
        function loadUserBetLogsHistory(userUid) {
            const betsNodeRef = ref(database, 'bets');
            // Structured constraint filters where value matches current UID
            const historyQuery = query(betsNodeRef, orderByChild('uid'), equalTo(userUid));

            onValue(historyQuery, (snapshot) => {
                const mainContainer = document.getElementById('historyFeedContainer');
                
                if(!snapshot.exists()) {
                    mainContainer.innerHTML = `
                        <div class="text-center py-20 text-gray-500">
                            <i class="fa-solid fa-receipt text-4xl text-gray-700 mb-2"></i>
                            <p class="text-sm">No betting tickets found on this account.</p>
                        </div>
                    `;
                    return;
                }

                // Clear previous view feeds
                mainContainer.innerHTML = "";
                const dataLogs = snapshot.val();
                
                // Sorting array to display recent game periods at the top
                const orderedKeys = Object.keys(dataLogs).sort((a, b) => {
                    return b.localeCompare(a); // Reverses default order to show recent first
                });

                for(let key of orderedKeys) {
                    const bet = dataLogs[key];

                    // Status pill theme logic structure
                    let statusHtml = `<span class="text-[10px] bg-yellow-500/10 text-yellow-500 border border-yellow-500/20 font-bold px-2 py-0.5 rounded-full uppercase">Pending</span>`;
                    let winLossAmountHtml = `<p class="text-xs font-mono font-bold text-gray-400">--</p>`;

                    if (bet.status === "Win") {
                        statusHtml = `<span class="text-[10px] bg-green-500/10 text-green-400 border border-green-500/20 font-bold px-2 py-0.5 rounded-full uppercase"><i class="fa-solid fa-circle-check mr-0.5"></i> Won</span>`;
                        winLossAmountHtml = `<p class="text-xs font-mono font-black text-green-400">+₹${parseFloat(bet.payout).toFixed(2)}</p>`;
                    } else if (bet.status === "Loss") {
                        statusHtml = `<span class="text-[10px] bg-red-500/10 text-red-400 border border-red-500/20 font-bold px-2 py-0.5 rounded-full uppercase">Lost</span>`;
                        winLossAmountHtml = `<p class="text-xs font-mono font-bold text-red-500">-₹${parseFloat(bet.amount).toFixed(2)}</p>`;
                    }

                    // Card DOM generation logic code mapping
                    mainContainer.innerHTML += `
                        <div class="card-dark rounded-xl p-4 space-y-3 shadow-md">
                            <div class="flex justify-between items-center border-b border-gray-800/40 pb-2">
                                <div>
                                    <p class="text-[10px] text-gray-400 font-medium tracking-wide">Game Period Reference ID</p>
                                    <p class="text-sm font-black text-white font-mono mt-0.5">${bet.period}</p>
                                </div>
                                <div>
                                    ${statusHtml}
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-3 gap-2 text-left">
                                <div>
                                    <p class="text-[9px] text-gray-500 uppercase">My Choice</p>
                                    <span class="text-xs font-black text-yellow-400 uppercase tracking-wider">${bet.selection}</span>
                                </div>
                                <div>
                                    <p class="text-[9px] text-gray-500 uppercase">Bet Amount</p>
                                    <p class="text-xs font-mono font-bold text-gray-300">₹${bet.amount}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[9px] text-gray-500 uppercase">Net Payout</p>
                                    ${winLossAmountHtml}
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
        }
    </script>
</body>
</html>
