
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Daddy Admin - Manage Users</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f17; color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        .admin-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gold-btn { background: linear-gradient(135deg, #ffe259 0%, #ffa751 100%); }
        input:focus { outline: none; border-color: #ffa751 !important; box-shadow: 0 0 10px rgba(255, 167, 81, 0.2); }
    </style>
</head>
<body class="pb-24 max-w-md mx-auto shadow-2xl relative min-h-screen bg-[#070a10]">

    <header class="bg-[#0f172a] border-b border-slate-800 p-4 sticky top-0 z-50 flex items-center justify-between shadow-xl">
        <div class="flex items-center">
            <a href="dashboard.html" class="text-slate-400 hover:text-white mr-4 text-xl">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <h1 class="text-lg font-black tracking-wider uppercase text-white">Users Core</h1>
        </div>
        <span class="text-[10px] bg-blue-500/10 text-blue-400 font-bold border border-blue-500/20 px-2.5 py-1 rounded-md uppercase">Database Tree</span>
    </header>

    <main class="p-4 space-y-4">
        
        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 text-xs">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
            <input type="text" id="userSearchInput" oninput="filterUsersList()" placeholder="Search players by email address..." class="w-full bg-slate-900 border border-slate-800 rounded-xl py-3 pl-9 pr-4 text-white text-xs font-medium placeholder-slate-500 transition-all">
        </div>

        <div class="admin-card rounded-2xl p-4 shadow-md space-y-3">
            <h2 class="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center"><i class="fa-solid fa-users-gear mr-2 text-yellow-500"></i> Active Players Index</h2>
            
            <div class="overflow-x-auto rounded-xl border border-slate-800/60 max-h-[60vh] overflow-y-auto">
                <table class="w-full text-left text-xs">
                    <thead class="bg-slate-900 text-slate-400 font-bold uppercase border-b border-slate-800">
                        <tr>
                            <th class="p-3">User Email</th>
                            <th class="p-3 text-right">Balance (₹)</th>
                            <th class="p-3 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminUsersManagementTableRows" class="divide-y divide-slate-800/40 text-slate-300">
                        <tr><td colspan="3" class="p-4 text-center text-slate-500 italic"><i class="fa-solid fa-spinner animate-spin mr-2 text-yellow-500"></i>Streaming database nodes profiles...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <div id="walletTuningModalOverlay" class="fixed inset-0 bg-black/80 z-50 backdrop-blur-xs hidden flex items-center justify-center p-4">
        <div class="w-full max-w-xs bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-2xl space-y-4 transform transition-all scale-95">
            <div class="flex justify-between items-center border-b border-slate-800/60 pb-2.5">
                <h3 class="text-xs font-bold uppercase tracking-wider text-white"><i class="fa-solid fa-wand-magic-sparkles text-amber-500 mr-1.5"></i> Adjust Points Credit</h3>
                <button onclick="closeWalletModal()" class="text-slate-500 hover:text-white text-xs cursor-pointer"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div class="space-y-1 text-xs">
                <p class="text-slate-500">Target Profile Identity Node:</p>
                <p id="modalTargetUserEmailDisplay" class="font-bold text-white break-all bg-slate-950 p-2 rounded-lg border border-slate-800/40 font-mono text-[11px]">Syncing...</p>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Adjustment Numeric Stake Value (₹)</label>
                <input type="number" id="modalAdjustmentAmountValueInput" placeholder="Enter amount (e.g. 500)" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white font-mono font-bold text-sm">
            </div>

            <div class="grid grid-cols-2 gap-2.5 pt-1">
                <button onclick="executeWalletBalanceMutation('CREDIT')" class="bg-emerald-600 hover:bg-emerald-500 text-black font-black text-[10px] uppercase py-2.5 rounded-xl transition-all active:scale-95 cursor-pointer">
                    <i class="fa-solid fa-plus mr-1"></i> Add Funds
                </button>
                <button onclick="executeWalletBalanceMutation('DEDUCT')" class="bg-red-600 hover:bg-red-500 text-white font-bold text-[10px] uppercase py-2.5 rounded-xl transition-all active:scale-95 cursor-pointer">
                    <i class="fa-solid fa-minus mr-1"></i> Deduct Funds
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Updated Production Firebase Setup Credentials Configuration (big-daddy-7422f)
        const firebaseConfig = {
          apiKey: "AIzaSyBjB5uOFrL8OfuqAHWlyB5_p_say0KrFuY",
          authDomain: "big-daddy-7422f.firebaseapp.com",
          databaseURL: "https://big-daddy-7422f-default-rtdb.firebaseio.com",
          projectId: "big-daddy-7422f",
          storageBucket: "big-daddy-7422f.firebasestorage.app",
          messagingSenderId: "528194459346",
          appId: "1:528194459346:web:458044786db1c36281ff0b",
          measurementId: "G-ZY2D9HT28C"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let activeTargetUid = null;
        let activeTargetCurrentBalance = 0;

        // 1. Establish Stream Hook for Live Users Tree
        onValue(ref(database, 'users'), (snapshot) => {
            const tbody = document.getElementById('adminUsersManagementTableRows');
            tbody.innerHTML = "";

            if(!snapshot.exists()) {
                tbody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-slate-500 italic">Zero customer records found in live node branch channels.</td></tr>`;
                return;
            }

            const dataObject = snapshot.val();
            Object.keys(dataObject).forEach((keyId) => {
                const user = dataObject[keyId];
                const displayEmail = user.email || "Google Account";
                const cleanQueryAttr = displayEmail.toLowerCase();
                const walletRepresentation = parseFloat(user.walletBalance || 0).toFixed(2);

                tbody.innerHTML += `
                    <tr class="user-row-item hover:bg-slate-900/30 transition-colors" data-email="${cleanQueryAttr}">
                        <td class="p-3 font-medium text-slate-300 max-w-[150px] truncate">
                            <p class="truncate text-white font-medium">${displayEmail}</p>
                            <p class="text-[9px] text-slate-500 font-mono tracking-wider">${user.uid}</p>
                        </td>
                        <td class="p-3 text-right font-mono font-black text-emerald-400">₹${walletRepresentation}</td>
                        <td class="p-3 text-center">
                            <button onclick="launchWalletControlModal('${user.uid}', '${displayEmail}', ${user.walletBalance || 0})" class="bg-slate-800 hover:bg-slate-700 text-yellow-500 border border-slate-700 px-2 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider active:scale-95 transition-transform cursor-pointer">
                                <i class="fa-solid fa-pen-to-square"></i> Edit
                            </button>
                        </td>
                    </tr>
                `;
            });
        });

        // 2. Dialog Operational Gatekeeping Hooks
        window.launchWalletControlModal = function(uid, email, currentBalance) {
            activeTargetUid = uid;
            activeTargetCurrentBalance = parseFloat(currentBalance);
            
            document.getElementById('modalTargetUserEmailDisplay').innerText = email;
            document.getElementById('modalAdjustmentAmountValueInput').value = "";
            document.getElementById('walletTuningModalOverlay').classList.remove('hidden');
        }

        window.closeWalletModal = function() {
            document.getElementById('walletTuningModalOverlay').classList.add('hidden');
            activeTargetUid = null;
        }

        // 3. Balance Points Manipulation Transaction Core Engine Mapping
        window.executeWalletBalanceMutation = function(actionType) {
            const amountInput = parseFloat(document.getElementById('modalAdjustmentAmountValueInput').value);
            
            if(isNaN(amountInput) || amountInput <= 0) {
                alert("Please declare a authentic operational stake factor point index value!");
                return;
            }

            let computedFinalBalance = activeTargetCurrentBalance;

            if (actionType === 'CREDIT') {
                computedFinalBalance += amountInput;
            } else if (actionType === 'DEDUCT') {
                if(amountInput > activeTargetCurrentBalance) {
                    alert("Operation Denied! Cannot deduct more than player's available credit statement.");
                    return;
                }
                computedFinalBalance -= amountInput;
            }

            // Perform direct atomic single tree reference updates mappings
            update(ref(database, 'users/' + activeTargetUid), {
                walletBalance: computedFinalBalance
            })
            .then(() => {
                alert(`Success! Account records re-routed and updated.\nNew Balance: ₹${computedFinalBalance.toFixed(2)}`);
                closeWalletModal();
            })
            .catch(err => {
                alert("Database transactional engine fault: " + err.message);
            });
        }

        // 4. Client Side Instant UI Array Matching Search Filter
        window.filterUsersList = function() {
            const query = document.getElementById('userSearchInput').value.toLowerCase().trim();
            const rows = document.getElementsByClassName('user-row-item');

            for (let row of rows) {
                const targetEmailAttr = row.getAttribute('data-email');
                if(targetEmailAttr.includes(query)) {
                    row.classList.remove('hidden');
                } else {
                    row.classList.add('hidden');
                }
            }
        }
    </script>
</body>
</html>
