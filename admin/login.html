<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Daddy - Admin Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f17; color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        .admin-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .gold-btn { background: linear-gradient(135deg, #ffe259 0%, #ffa751 100%); }
        input:focus { outline: none; border-color: #ffa751 !important; box-shadow: 0 0 10px rgba(255, 167, 81, 0.2); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md admin-gradient rounded-3xl p-8 border border-slate-800 shadow-2xl space-y-6">
        
        <div class="text-center space-y-2">
            <div class="w-16 h-16 bg-amber-500/10 text-yellow-500 border border-yellow-500/20 rounded-2xl flex items-center justify-center text-3xl mx-auto shadow-md">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="text-xl font-black uppercase tracking-widest text-white mt-3">Admin Console</h1>
            <p class="text-xs text-slate-400">Secure credential handshake gatekeeper</p>
        </div>

        <div class="space-y-4">
            <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block">Administrator Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500 text-xs">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="adminEmail" placeholder="admin@bigdaddy.com" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl py-3 pl-10 pr-4 text-white text-sm font-medium transition-all">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block">Security Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500 text-xs">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="adminPassword" placeholder="••••••••" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl py-3 pl-10 pr-4 text-white text-sm transition-all">
                </div>
            </div>

            <button onclick="handleAdminLogin()" class="w-full gold-btn text-black font-black text-xs uppercase py-3.5 rounded-xl shadow-lg active:scale-95 transition-transform mt-2 cursor-pointer">
                <i class="fa-solid fa-key mr-1.5"></i> Authenticate Session
            </button>
        </div>

        <div class="text-center">
            <a href="dashboard.html" class="text-[10px] text-slate-500 hover:text-slate-300 font-medium tracking-wide transition-colors">
                <i class="fa-solid fa-circle-info mr-1"></i> Authorized Personnel Only Nodes
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Updated Production Firebase Setup Credentials Configuration (big-daddy-7422f)
        const firebaseConfig = {
          apiKey: "AIzaSyBjB5uOFrL8OfuqAHWlyB5_p_say0KrFuY",
          authDomain: "big-daddy-7422f.firebaseapp.com",
          databaseURL: "https://big-daddy-7422f-default-rtdb.firebaseio.com",
          projectId: "big-daddy-7422f",
          storageBucket: "big-daddy-7422f.firebasestorage.app",
          messagingSenderId: "528194459346",
          appId: "1:528194459346:web:458044786db1c36281ff0b",
          measurementId: "G-ZY2D9HT28C"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        window.handleAdminLogin = function() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            if(!email || !password) {
                alert("Please fill in all security fields.");
                return;
            }

            // Step 1: Firebase Auth standard sign-in loop
            signInWithEmailAndPassword(auth, email, password)
            .then(async (userCredential) => {
                const user = userCredential.user;

                // Step 2: Double Verification Check - Verify role under 'system_admins' node matrix
                const adminCheckSnap = await get(ref(database, 'system_admins/' + user.uid));
                
                if (adminCheckSnap.exists() && adminCheckSnap.val().role === "SuperAdmin") {
                    // Success validation redirection to the main stats dashboard panel
                    window.location.href = "dashboard.html";
                } else {
                    alert("Access Denied! Your authenticated UID does not have administrator privileges.");
                    auth.signOut(); // Terminate session instantly if verification fails
                }
            })
            .catch((error) => {
                alert("Authentication Failed: " + error.message);
            });
        }
    </script>
</body>
</html>
